<svg xmlns='http://www.w3.org/2000/svg' width='1850' height='1200' viewBox='0 0 1850 1200'>
  <defs>
    <style>
      .bg{fill:#f5f7fb}.title{font:700 30px Segoe UI,Arial;fill:#12324a}
      .h{fill:#1e3a8a}.b{fill:#fff;stroke:#1e3a8a;stroke-width:2}.t{font:14px Consolas,monospace;fill:#1f2937}
      .th{font:700 16px Segoe UI,Arial;fill:#fff}.r{stroke:#334155;stroke-width:2;marker-end:url(#m)}.rt{font:12px Segoe UI,Arial;fill:#334155}
    </style>
    <marker id='m' markerWidth='10' markerHeight='10' refX='9' refY='3' orient='auto'><path d='M0,0 L10,3 L0,6 Z' fill='#334155'/></marker>
  </defs>
  <rect class='bg' x='0' y='0' width='1850' height='1200'/>
  <text class='title' x='30' y='50'>ERD Pemilihan OSIS (Token Sekali Pakai)</text>

  <rect class='b' x='40' y='90' width='390' height='250'/><rect class='h' x='40' y='90' width='390' height='36'/><text class='th' x='55' y='113'>users</text>
  <text class='t' x='55' y='145'>id (PK)</text><text class='t' x='55' y='167'>name: varchar(100)</text><text class='t' x='55' y='189'>email: varchar(120) UK</text><text class='t' x='55' y='211'>password: varchar(255)</text><text class='t' x='55' y='233'>role: enum(admin,panitia)</text><text class='t' x='55' y='255'>aktif: boolean</text><text class='t' x='55' y='277'>created_at, updated_at</text>

  <rect class='b' x='40' y='380' width='390' height='170'/><rect class='h' x='40' y='380' width='390' height='36'/><text class='th' x='55' y='403'>kelas</text>
  <text class='t' x='55' y='435'>id (PK)</text><text class='t' x='55' y='457'>nama_kelas: varchar(50)</text><text class='t' x='55' y='479'>tingkat: tinyint</text><text class='t' x='55' y='501'>created_at, updated_at</text>

  <rect class='b' x='470' y='90' width='430' height='210'/><rect class='h' x='470' y='90' width='430' height='36'/><text class='th' x='485' y='113'>siswa</text>
  <text class='t' x='485' y='145'>id (PK)</text><text class='t' x='485' y='167'>nis: varchar(30) UK</text><text class='t' x='485' y='189'>nama: varchar(100)</text><text class='t' x='485' y='211'>kelas_id: FK -&gt; kelas.id</text><text class='t' x='485' y='233'>aktif: boolean</text><text class='t' x='485' y='255'>created_at, updated_at</text>

  <rect class='b' x='470' y='340' width='430' height='190'/><rect class='h' x='470' y='340' width='430' height='36'/><text class='th' x='485' y='363'>guru</text>
  <text class='t' x='485' y='395'>id (PK)</text><text class='t' x='485' y='417'>nip: varchar(30) UK</text><text class='t' x='485' y='439'>nama: varchar(100)</text><text class='t' x='485' y='461'>aktif: boolean</text><text class='t' x='485' y='483'>created_at, updated_at</text>

  <rect class='b' x='940' y='90' width='430' height='240'/><rect class='h' x='940' y='90' width='430' height='36'/><text class='th' x='955' y='113'>periode_pemilihan</text>
  <text class='t' x='955' y='145'>id (PK)</text><text class='t' x='955' y='167'>nama_periode: varchar(120)</text><text class='t' x='955' y='189'>mulai_pada: datetime</text><text class='t' x='955' y='211'>selesai_pada: datetime</text><text class='t' x='955' y='233'>status: enum(draf,aktif,ditutup)</text><text class='t' x='955' y='255'>mode_pasangan: enum(ketua_saja,ketua_wakil)</text><text class='t' x='955' y='277'>created_at, updated_at</text>

  <rect class='b' x='940' y='370' width='430' height='230'/><rect class='h' x='940' y='370' width='430' height='36'/><text class='th' x='955' y='393'>kandidat</text>
  <text class='t' x='955' y='425'>id (PK)</text><text class='t' x='955' y='447'>periode_id: FK -&gt; periode_pemilihan.id</text><text class='t' x='955' y='469'>nomor_urut: tinyint (UK per periode)</text><text class='t' x='955' y='491'>visi: varchar(500)</text><text class='t' x='955' y='513'>misi: varchar(1500)</text><text class='t' x='955' y='535'>foto: varchar(255) nullable</text><text class='t' x='955' y='557'>created_at, updated_at</text>

  <rect class='b' x='1410' y='90' width='400' height='210'/><rect class='h' x='1410' y='90' width='400' height='36'/><text class='th' x='1425' y='113'>kandidat_anggota</text>
  <text class='t' x='1425' y='145'>id (PK)</text><text class='t' x='1425' y='167'>kandidat_id: FK -&gt; kandidat.id</text><text class='t' x='1425' y='189'>siswa_id: FK -&gt; siswa.id</text><text class='t' x='1425' y='211'>peran: enum(ketua,wakil)</text><text class='t' x='1425' y='233'>UK: kandidat_id+peran</text><text class='t' x='1425' y='255'>UK: kandidat_id+siswa_id</text>

  <rect class='b' x='1410' y='340' width='400' height='230'/><rect class='h' x='1410' y='340' width='400' height='36'/><text class='th' x='1425' y='363'>suara</text>
  <text class='t' x='1425' y='395'>id (PK)</text><text class='t' x='1425' y='417'>periode_id: FK -&gt; periode_pemilihan.id</text><text class='t' x='1425' y='439'>kandidat_id: FK -&gt; kandidat.id</text><text class='t' x='1425' y='461'>tipe_pemilih: enum(siswa,guru)</text><text class='t' x='1425' y='483'>pemilih_id: bigint (polymorphic)</text><text class='t' x='1425' y='505'>created_at</text><text class='t' x='1425' y='527'>UK: periode_id+tipe_pemilih+pemilih_id</text>

  <rect class='b' x='1410' y='610' width='400' height='250'/><rect class='h' x='1410' y='610' width='400' height='36'/><text class='th' x='1425' y='633'>token_pemilih</text>
  <text class='t' x='1425' y='665'>id (PK)</text><text class='t' x='1425' y='687'>periode_id: FK -&gt; periode_pemilihan.id</text><text class='t' x='1425' y='709'>tipe_pemilih: enum(siswa,guru)</text><text class='t' x='1425' y='731'>pemilih_id: bigint (polymorphic)</text><text class='t' x='1425' y='753'>token_hash: varchar(255) UK</text><text class='t' x='1425' y='775'>digunakan_pada, kadaluarsa_pada</text><text class='t' x='1425' y='797'>UK: periode_id+tipe_pemilih+pemilih_id</text>

  <line class='r' x1='430' y1='465' x2='470' y2='210'/><text class='rt' x='438' y='335'>1..N</text>
  <line class='r' x1='1370' y1='210' x2='1410' y2='190'/><text class='rt' x='1376' y='186'>1..N</text>
  <line class='r' x1='900' y1='210' x2='940' y2='470'/><text class='rt' x='905' y='345'>1..N</text>
  <line class='r' x1='1370' y1='470' x2='1410' y2='440'/><text class='rt' x='1377' y='430'>1..N</text>
  <line class='r' x1='1140' y1='330' x2='1140' y2='370'/><text class='rt' x='1150' y='355'>1..N</text>
  <line class='r' x1='1140' y1='330' x2='1410' y2='430'/><text class='rt' x='1260' y='360'>1..N</text>
  <line class='r' x1='1140' y1='330' x2='1410' y2='700'/><text class='rt' x='1260' y='520'>1..N</text>

  <text class='t' x='40' y='1130'>Catatan: users hanya admin/panitia. Pemilih login dengan identitas + token sekali pakai.</text>
</svg>
